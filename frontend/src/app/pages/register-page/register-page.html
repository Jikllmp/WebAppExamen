<div class="register-container">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
    <h2>Inscription</h2>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" formControlName="nom">
    </div>

    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" formControlName="prenom">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email">
      @if (email?.invalid && email?.touched) {
        <small class="error">Email invalide.</small>
      }
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" formControlName="password">
      @if (password?.invalid && password?.touched) {
        <small class="error">6 caractères minimum.</small>
      }
    </div>

    <div class="form-group">
      <label for="telephone">Téléphone</label>
      <input type="text" id="telephone" formControlName="telephone">
    </div>

    <div class="form-group">
      <label for="role">Type de compte</label>
      <select id="role" formControlName="role">
        <option value="Particulier">Particulier</option>
        <option value="Agence">Agence</option>
      </select>
    </div>

    @if (role?.value === 'Agence') {
      <div class="form-group">
        <label for="numeroTVA">Numéro de TVA</label>
        <input type="text" id="numeroTVA" formControlName="numeroTVA">
      </div>
    }

    <button type="submit" [disabled]="registerForm.invalid">S'inscrire</button>

    <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </form>
</div>
